<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Ultimate Name Generator </title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  .container {
    background-color: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-top: 50px;
    width: 90%;
    max-width: 800px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  h2 {
    font-size: 2em;
    margin-bottom: 20px;
  }

  label {
    margin: 0 10px;
    font-weight: bold;
  }

  select, input[type="number"], input[type="radio"] {
    margin: 10px;
    padding: 8px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
  }

  button {
    padding: 10px 20px;
    margin: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(90deg, #ff6a00, #ee0979);
    color: white;
    font-weight: bold;
    transition: transform 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .names-output {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
    gap: 10px;
  }

  .name-card {
    background: rgba(255,255,255,0.2);
    padding: 12px 20px;
    border-radius: 15px;
    min-width: 150px;
    font-weight: bold;
    text-align: center;
    transition: transform 0.2s, background 0.2s;
    cursor: pointer;
  }

  .name-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.4);
  }
</style>
</head>

<div class="container">
  <h2> Name Generator</h2>

</div>

/* ===== Helper Functions ===== */
function getGender() {
  const radios = document.getElementsByName('gender');
  for (let r of radios) if (r.checked) return r.value;
  return "male";
}

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateName(category, gender) {
  let first = "", last = "";
  if (category === "arab") {
    first = (gender==="male")? getRandom(maleArab) : getRandom(femaleArab);
    last = getRandom(lastArab);
  } else if (category === "japan") {
    first = (gender==="male")? getRandom(maleJapan) : getRandom(femaleJapan);
    last = getRandom(lastJapan);
  } else if (category === "us") {
    first = (gender==="male")? getRandom(maleUS) : getRandom(femaleUS);
    last = getRandom(lastUS);
  } else {
    first = getRandom(fantasyNames);
    last = getRandom(fantasyNames);
  }
  return first + " " + last;
}

/* ===== Generate Button ===== */
document.getElementById("generate").addEventListener("click", ()=>{
  const category = document.getElementById("category").value;
  const gender = getGender();
  const count = Number(document.getElementById("count").value);
  const outputDiv = document.getElementById("output");
  outputDiv.innerHTML = ""; // clear previous
  for (let i=0; i<count; i++){
    const name = generateName(category, gender);
    const card = document.createElement("div");
    card.classList.add("name-card");
    card.innerText = name;
    outputDiv.appendChild(card);
  }
});

/* ===== Copy All Button ===== */
document.getElementById("copy").addEventListener("click", ()=>{
  const names = Array.from(document.querySelectorAll(".name-card")).map(c=>c.innerText).join("\n");
  navigator.clipboard.writeText(names);
  alert("Copied " + names.split("\n").length + " names!");
});
